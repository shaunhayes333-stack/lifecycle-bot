name: Build AATE APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifecycle_apk
    
    permissions:
      contents: write  # Required for creating releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Accept SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Release APK
        run: |
          chmod +x gradlew || true
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar"
          echo "========================================"
          echo "Building AATE v5.0.${{ github.run_number }}"
          echo "versionCode = $((500 + ${{ github.run_number }}))"
          echo "========================================"
          ./gradlew clean assembleRelease --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }}
          echo "Built APK:"
          ls -la app/build/outputs/apk/release/
          # Rename APK to include build number
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/AATE_v5.0.${{ github.run_number }}.apk
          echo "Final APK:"
          ls -la app/build/outputs/apk/release/

      # Upload as artifact (backup)
      - uses: actions/upload-artifact@v4
        with:
          name: AATE_v5.0.${{ github.run_number }}
          path: lifecycle_apk/app/build/outputs/apk/release/AATE_v5.0.${{ github.run_number }}.apk

      # Create/Update "latest" release for easy public download
      - name: Delete old latest release
        continue-on-error: true
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "AATE Latest Build (v5.0.${{ github.run_number }})"
          body: |
            ## 📱 AATE v5.0.${{ github.run_number }}
            
            **Public Download Link** - No login required!
            
            ### 📥 Download
            Click the APK file below to download directly.
            
            ### ✨ Latest Changes
            - Build #${{ github.run_number }}
            - See commit history for details
            
            ### 📋 Requirements
            - Android 8.0+ (API 26)
            - Allow "Install from unknown sources" in settings
            
            ---
            🔗 **Share this link:** `https://github.com/${{ github.repository }}/releases/latest`
          files: lifecycle_apk/app/build/outputs/apk/release/AATE_v5.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
