name: Runtime Smoke Test

# V5.9.657 — operator request: stop relying on "build → operator installs →
# operator captures logcat → operator pastes here" 4-hour cycles. This
# workflow boots an Android emulator on the runner, installs the freshly
# built APK, opens MainActivity, captures Logcat for 3 minutes, and uploads
# the full + filtered logs as artifacts. Lets the agent see real on-device
# behavior without needing physical hardware.
#
# Triggers:
#   - workflow_dispatch    (manual run from the Actions tab)
#   - completion of "Build AATE APK"  (auto-runs after every green build)
#
# Cost: ~10-15 min wall clock. Free on public repos.

on:
  workflow_dispatch:
    inputs:
      capture_seconds:
        description: 'Logcat capture duration (seconds)'
        required: false
        default: '180'
  workflow_run:
    workflows: ["Build AATE APK"]
    types: [completed]

jobs:
  smoke:
    runs-on: ubuntu-latest
    # Don't run when the upstream build failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 35

    defaults:
      run:
        working-directory: lifecycle_apk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Enable KVM (hardware accel for emulator)
        # Without KVM the emulator runs in software and times out on most
        # GitHub runners. KVM is available on ubuntu-latest since 2023.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api30-x86_64-googleapis

      - name: Create AVD snapshot for cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Build, install, run, capture logcat
        env:
          CAPTURE_SECONDS: ${{ github.event.inputs.capture_seconds || '180' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: .
          script: bash ci/runtime-test.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-logcat-${{ github.run_number }}
          path: |
            logcat_full.txt
            logcat_filtered.txt
            funnel_summary.txt
            ui_dump.xml

      - name: Fail job if pipeline funnel collapsed
        if: always()
        # Hard gate: if INTAKE>0 but SAFETY+V3+LANE_EVAL all zero, the
        # pipeline is silently choked. Mark the job as failed so the
        # operator gets a red X (and the artifact for diagnosis).
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/funnel_summary.txt" ]; then
            echo "No summary produced — emulator step likely failed."
            exit 1
          fi
          INTAKE=$(grep -oP 'INTAKE:\s+\K\d+' "$GITHUB_WORKSPACE/funnel_summary.txt" || echo 0)
          SAFETY=$(grep -oP 'SAFETY:\s+\K\d+' "$GITHUB_WORKSPACE/funnel_summary.txt" || echo 0)
          V3=$(grep -oP 'V3:\s+\K\d+' "$GITHUB_WORKSPACE/funnel_summary.txt" || echo 0)
          LANE=$(grep -oP 'LANE_EVAL:\s+\K\d+' "$GITHUB_WORKSPACE/funnel_summary.txt" || echo 0)
          if [ "$INTAKE" -gt 0 ] && [ "$SAFETY" -eq 0 ] && [ "$V3" -eq 0 ] && [ "$LANE" -eq 0 ]; then
            echo "::error::Pipeline funnel collapsed: INTAKE=$INTAKE but SAFETY/V3/LANE_EVAL all zero. Bot is silently choked."
            exit 1
          fi
          echo "Pipeline funnel OK: INTAKE=$INTAKE SAFETY=$SAFETY V3=$V3 LANE=$LANE"
        working-directory: .
