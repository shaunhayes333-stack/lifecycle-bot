name: Build Lifecycle Bot APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: lifecycle_bot/lifecycle_apk
        run: chmod +x gradlew

      - name: Build APK
        working-directory: lifecycle_bot/lifecycle_apk
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-bot-apk
          path: lifecycle_bot/lifecycle_apk/app/build/outputs/apk/debug/*.apk
