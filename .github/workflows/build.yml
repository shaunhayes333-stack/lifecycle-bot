name: Build AATE APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lifecycle_apk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          # V5.0.4203 — build job does not need the Android Emulator.
          # setup-android's broad default package install can fetch emulator
          # zips; 4202 failed before compile on a corrupt emulator archive
          # ("ZipFile unknown archive"). Install only the SDK packages required
          # for compileSdk/targetSdk 34 so APK CI stops depending on emulator CDN.
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # CI infra hardening: cache the Gradle distribution + deps so a transient
      # outage on the gradle-distributions CDN (observed: repeated HTTP 504 /
      # download timeout on gradle-8.7-bin.zip) cannot fail an otherwise-green
      # build. Once cached, later runs skip the network fetch entirely.
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Compute AATE build number
        id: aate_build
        run: |
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 1))
          # V5.0.4135 — Patch version derived from CI run number; AATE_VERSION
          # now holds major.minor prefix only (see nested workflow comment).
          BASE="$(cat AATE_VERSION)"
          VERSION_NAME="${BASE}.${BUILD_NUMBER}"
          echo "AATE_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "AATE_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Accept SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Golden Tape literal static scan
        run: python3 ci/golden_tape_literal_scan.py

      - name: Build Release APK
        run: |
          chmod +x gradlew || true
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar"
          # CI infra hardening: the gradle-distributions CDN intermittently
          # returns 504 / times out. Retry the wrapper's distribution download
          # up to 5 times with backoff before giving up, so a transient outage
          # no longer fails the build (the code itself never reached compile in
          # the failed runs — the wrapper died fetching gradle-8.7-bin.zip).
          for i in 1 2 3 4 5; do
            ./gradlew --version --no-daemon && break
            echo "Gradle distribution download attempt $i failed (CDN flaky); retrying in $((i*15))s..."
            sleep $((i*15))
          done
          echo "========================================"
          echo "Building AATE v${{ steps.aate_build.outputs.version_name }}"
          echo "versionCode = $((500 + AATE_BUILD_NUMBER))"
          echo "========================================"
          # V5.9.495z42 P1 — run unit tests before release build.
          # SellExecutionOverhaulTest (10 cases) + existing harness.
          # Tests must pass for the build to succeed; failure fails CI.
          ./gradlew testReleaseUnitTest --no-daemon --stacktrace -PbuildNumber=$AATE_BUILD_NUMBER -PaateVersionName=$AATE_VERSION_NAME
          ./gradlew assembleRelease --no-daemon -PbuildNumber=$AATE_BUILD_NUMBER -PaateVersionName=$AATE_VERSION_NAME
          echo "Built APK:"
          ls -la app/build/outputs/apk/release/
          # APK is already named AATE_v5.0.{buildNumber}.apk by gradle

      - uses: actions/upload-artifact@v4
        with:
          name: AATE_v${{ steps.aate_build.outputs.version_name }}
          path: lifecycle_apk/app/build/outputs/apk/release/AATE_v${{ steps.aate_build.outputs.version_name }}.apk
